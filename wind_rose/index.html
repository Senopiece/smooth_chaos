<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<style>
body {
  margin: 0;
  background: #0e0e11;
  font-family: sans-serif;
  color: #aaa;
  display: flex;
  justify-content: center;
  align-items: flex-start;
  min-height: 100vh;
  padding: 20px;
  box-sizing: border-box;
}

/* Σ block pinned to top-left with 40px padding */
.sumBlock {
  position: fixed;
  top: 40px;
  left: 40px;
  display: flex;
  flex-direction: column;
  gap: 6px;
  z-index: 10;
}

/* component count toggle pinned to top-right */
.componentBlock {
  position: fixed;
  top: 40px;
  right: 40px;
  display: flex;
  flex-direction: column;
  gap: 6px;
  z-index: 10;
}

.componentLabel {
  font-size: 11px;
  opacity: 0.7;
}

.sigma {
  font-size: 22px;
  color: #ff2f87;
  line-height: 1;
}

.sumVal {
  font-size: 12px;
  opacity: 0.8;
  margin-top: -4px;
}

select {
  background: #111;
  color: #aaa;
  border: none;
  height: 22px;
  font-size: 11px;
  width: 90px;
}

/* container centers content and is responsive */
.container {
  display: flex;
  flex-direction: column;
  align-items: center;
  width: 100%;
  max-width: 500px;
}

/* canvas scales with screen size */
canvas {
  width: 90vw;
  max-width: 420px;
  height: auto;
  aspect-ratio: 1/1;
  margin-top: 40px;
}

/* bottom controls responsive */
.controls {
  margin-top: 20px;
  width: 90%;
  max-width: 420px;
  display: flex;
  flex-direction: column;
  gap: 10px;
}

.row {
  display: flex;
  align-items: center;
  gap: 10px;
}

.label {
  width: 50px;
  font-size: 11px;
  opacity: 0.6;
}

.value {
  width: 40px;
  text-align: right;
  font-size: 11px;
  opacity: 0.8;
}

.slider-wrap {
  flex: 1;
}

input[type="range"] {
  width: 100%;
  appearance: none;
  height: 2px;
  background: #444;
  outline: none;
}

input[type="range"]::-webkit-slider-thumb {
  appearance: none;
  width: 10px;
  height: 10px;
  background: #ff2f87;
  border-radius: 50%;
  cursor: pointer;
}

.ticks {
  display: flex;
  justify-content: space-between;
  font-size: 9px;
  opacity: 0.4;
  margin-top: 2px;
}
</style>
</head>

<body>
<div class="container">
  <!-- Canvas at center -->
  <canvas id="c"></canvas>

  <!-- controls below canvas -->
  <div class="controls">
    <div class="row">
      <div class="label">θ</div>
      <div class="slider-wrap">
        <input id="angle" type="range" min="0" max="360" value="0">
        <div class="ticks"><span>0</span><span>360</span></div>
      </div>
      <div class="value" id="angleVal"></div>
    </div>

    <div class="row">
      <div class="label">|v|</div>
      <div class="slider-wrap">
        <input id="mag" type="range" min="0" max="1" step="0.01" value="0.5">
        <div class="ticks"><span>0</span><span>1</span></div>
      </div>
      <div class="value" id="magVal"></div>
    </div>

    <div class="row">
      <div class="label">R</div>
      <div class="slider-wrap">
        <input id="radius" type="range" min="0.1" max="3" step="0.01" value="1">
        <div class="ticks"><span>0.1</span><span>3</span></div>
      </div>
      <div class="value" id="radVal"></div>
    </div>
  </div>
</div>

<!-- Σ block pinned -->
<div class="sumBlock">
  <div class="sigma">Σ</div>
  <div class="sumVal" id="sum"></div>
  <select id="mode">
    <option value="softmax">softmax</option>
    <option value="relu">relu</option>
    <option value="sigmoid">sigmoid</option>
  </select>
</div>

<div class="componentBlock">
  <div class="componentLabel">components</div>
  <select id="componentCount">
    <option value="6">6</option>
    <option value="4">4</option>
  </select>
</div>

<script>
// existing JS logic
const canvas = document.getElementById("c");
const ctx = canvas.getContext("2d");

function resizeCanvas() {
  const size = Math.min(window.innerWidth*0.9, 420);
  canvas.width = size;
  canvas.height = size;
}
window.addEventListener("resize", resizeCanvas);
resizeCanvas();

const VIS_R = 120;

function getDirs(count) {
  if (count === 4) {
    // Plus layout: right, up, left, down
    return [[1, 0], [0, -1], [-1, 0], [0, 1]];
  }

  const dirs = [];
  for (let i = 0; i < count; i++) {
    const a = i * Math.PI * 2 / count;
    dirs.push([Math.cos(a), Math.sin(a)]);
  }
  return dirs;
}

function softmax(arr) { const max = Math.max(...arr); const exps = arr.map(v => Math.exp(v - max)); const sum = exps.reduce((a,b)=>a+b,0); return exps.map(v => v / sum); }
function relu(arr) { return arr.map(v => Math.max(0, v)); }
function sigmoid(arr) { return arr.map(v => 1/(1+Math.exp(-v))); }
function transform(arr, mode) { if (mode === "softmax") return softmax(arr); if (mode === "relu") return relu(arr); if (mode === "sigmoid") return sigmoid(arr); return arr; }

function updateLabels(angle, mag, R) {
  document.getElementById("angleVal").innerText = Math.round(angle);
  document.getElementById("magVal").innerText = mag.toFixed(2);
  document.getElementById("radVal").innerText = R.toFixed(2);
}

function draw() {
  ctx.clearRect(0,0,canvas.width,canvas.height);

  const angleDeg = parseFloat(document.getElementById("angle").value);
  const angle = angleDeg * Math.PI / 180;
  const mag = parseFloat(document.getElementById("mag").value);
  const R = parseFloat(document.getElementById("radius").value);
  const mode = document.getElementById("mode").value;
  const componentCount = parseInt(document.getElementById("componentCount").value, 10);
  const dirs = getDirs(componentCount);

  updateLabels(angleDeg, mag, R);

  const v = [Math.cos(angle)*mag, Math.sin(angle)*mag];

  ctx.strokeStyle = "#333";
  ctx.lineWidth = 2;

  dirs.forEach(d => {
    ctx.beginPath();
    ctx.moveTo(canvas.width/2, canvas.height/2);
    ctx.lineTo(canvas.width/2 + d[0]*VIS_R, canvas.height/2 + d[1]*VIS_R);
    ctx.stroke();
  });

  const dots = dirs.map(d => (d[0]*v[0] + d[1]*v[1]) * R);
  const vals = transform(dots, mode);
  const sum = vals.reduce((a,b)=>a+b,0);
  document.getElementById("sum").innerText = sum.toFixed(3);

  vals.forEach((p,i) => {
    const d = dirs[i];
    ctx.beginPath();
    ctx.moveTo(canvas.width/2, canvas.height/2);
    ctx.lineTo(canvas.width/2 + d[0]*VIS_R*p*2, canvas.height/2 + d[1]*VIS_R*p*2);
    ctx.strokeStyle = "#ff2f87";
    ctx.lineWidth = 4;
    ctx.stroke();
  });

  ctx.beginPath();
  ctx.moveTo(canvas.width/2, canvas.height/2);
  ctx.lineTo(canvas.width/2 + v[0]*VIS_R, canvas.height/2 + v[1]*VIS_R);
  ctx.strokeStyle = "#00e0ff";
  ctx.lineWidth = 3;
  ctx.stroke();

  requestAnimationFrame(draw);
}

draw();
</script>
</body>
</html>
